name: nambur_connect
description: A village directory and help app for Nambur.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.1
  image_picker: ^1.1.1
  flutter_map: ^7.0.1
  latlong2: ^0.9.0
  http: ^1.1.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
